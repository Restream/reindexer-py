name: Upload Release Package to TestPyPI with testing

on:
  pull_request:
    types: [opened, reopened]
  push:
    branches-ignore:
      - master
jobs:
  build:
    name: Build project
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout PyReindexer
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          curl -L https://github.com/Restream/reindexer/raw/master/dependencies.sh | sudo bash -s
      - name: Build Reindexer
        run: |
          git clone --depth 1 https://github.com/Restream/reindexer
          cd reindexer
          mkdir -p build && cd build
          cmake ..
          make -j8
          sudo make install
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build PyReindexer
        run: python -m build
      - name: Store build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/*

  deploy:
    name: Upload release to test PyPi
    runs-on: ubuntu-22.04
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pyreindexer/
    permissions:
      id-token: write
    steps:
      - name: Fetch build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist/
      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # user: __token__ ## used as default
          # password: ${{ secrets.TESTPYPI_TOKEN }}
          skip_existing: true
          verbose: true
          repository_url: https://test.pypi.org/legacy/

  test-macos:
    runs-on: macos-14
    needs: deploy
    steps:
      - name: Checkout PyReindexer
        uses: actions/checkout@v4

      - name: Install Reindexer
        run: |
          brew tap restream/reindexer
          brew install reindexer
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyReindexer
        run: python -m pip install -vvv --index-url https://test.pypi.org/simple/ --no-deps pyreindexer
        shell: bash

      - name: Prepare Test Environment
        run: python -m pip install -r requirements.txt
        shell: bash

      - name: Test
        run: |
          python pip show pyreindexer
          python -c "import sysconfig; print(sysconfig.get_path('purelib'))"
          cd /Library/Frameworks/Python.framework/Versions/3.12/lib/python3.12/site-packages/pyreindexer
          $GITHUB_WORKSPACE/.github/workflows/test.sh
        shell: bash

  test-ubuntu:
    strategy:
      matrix:
        os: [ubuntu-20.04,ubuntu-22.04]
      fail-fast: false
    runs-on: ${{matrix.os}}
    env:
      OS: ${{matrix.os}}
    needs: deploy
    steps:
      - name: Checkout PyReindexer
        uses: actions/checkout@v4

      - name: Install Reindexer-Dev
        run: |
          curl https://repo.reindexer.io/RX-KEY.GPG | sudo apt-key add
          if [[ $OS == ubuntu-20.04 ]]; then
            echo 'deb https://repo.reindexer.io/ubuntu-focal /' | sudo tee -a /etc/apt/sources.list
          else
            echo 'deb https://repo.reindexer.io/ubuntu-jammy /' | sudo tee -a /etc/apt/sources.list
          fi
          sudo apt-get update -y
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y reindexer-dev
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyReindexer
        run: |
          python -m pip install setuptools
          python -m pip install -vvv --index-url https://test.pypi.org/simple/ --no-deps pyreindexer
        shell: bash

      - name: Install Reindexer-Server
        run: sudo apt-get install reindexer-server
        shell: bash

      - name: Prepare Test Environment
        run: python -m pip install -r requirements.txt
        shell: bash

      - name: Test
        run: |
          cd $(python -m site --user-site)/pyreindexer
          $GITHUB_WORKSPACE/.github/workflows/test.sh
        shell: bash
