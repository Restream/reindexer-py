on:
  pull_request:
    types: [opened, reopened]
  push:
    branches-ignore:
      - master
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          curl -L https://github.com/Restream/reindexer/raw/master/dependencies.sh | sudo bash -s
        shell: bash

      - name: Build Reindexer
        run: |
          git clone --depth 1 https://github.com/Restream/reindexer
          cd reindexer
          mkdir -p build && cd build
          cmake ..
          make -j8
        shell: bash

      - name: Install Reindexer
        run: sudo make install
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build PyReindexer
        run: |
          python3 -m pip install setuptools
          python3 setup.py sdist bdist_wheel
        shell: bash

      - name: Deploy PyReindexer To Test-Pypi
        env:
          TESTPYPI_TOKEN: ${{ secrets.TESTPYPI_TOKEN }}
        run: |
          python3 -m pip install twine
          python3 -m twine upload --skip-existing --verbose --repository testpypi dist/* -u __token__ -p pypi-$TESTPYPI_TOKEN
          # wait for deploy finishing on test pypi server
          sleep 240
        shell: bash

  test-macos:
    runs-on: macos-14
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Install Reindexer
        run: |
          brew tap restream/reindexer
          brew install reindexer
        shell: bash

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyReindexer
        run: python3 -m pip install -vvv --index-url https://test.pypi.org/simple/ --no-deps pyreindexer
        shell: bash

      - name: Prepare Test Environment
        run: python3 -m pip install -r requirements.txt
        shell: bash

      - name: Test
        run: |
          python3 pip show pyreindexer
          python3 -c "import sysconfig; print(sysconfig.get_path('purelib'))"
          cd /Library/Frameworks/Python.framework/Versions/3.12/lib/python3.12/site-packages/pyreindexer
          $GITHUB_WORKSPACE/.github/workflows/test.sh
        shell: bash

  test-ubuntu:
    strategy:
      matrix:
        os: [ubuntu-20.04,ubuntu-22.04]
      fail-fast: false
    runs-on: ${{matrix.os}}
    env:
      OS: ${{matrix.os}}
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Install Reindexer-Dev
        run: |
          curl https://repo.reindexer.io/RX-KEY.GPG | sudo apt-key add
          if [[ $OS == ubuntu-20.04 ]]; then
            echo 'deb https://repo.reindexer.io/ubuntu-focal /' | sudo tee -a /etc/apt/sources.list
          else
            echo 'deb https://repo.reindexer.io/ubuntu-jammy /' | sudo tee -a /etc/apt/sources.list
          fi
          sudo apt-get update -y
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y reindexer-dev
        shell: bash

      - name: Install PyReindexer
        run: |
          python3 -m pip install setuptools
          python3 -m pip install -vvv --index-url https://test.pypi.org/simple/ --no-deps pyreindexer
        shell: bash

      - name: Install Reindexer-Server
        run: sudo apt-get install reindexer-server
        shell: bash

      - name: Prepare Test Environment
        run: python3 -m pip install -r requirements.txt
        shell: bash

      - name: Test
        run: |
          cd $(python3 -m site --user-site)/pyreindexer
          $GITHUB_WORKSPACE/.github/workflows/test.sh
        shell: bash
