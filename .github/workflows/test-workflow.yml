name: Test the project
on:
  push:
    branches-ignore:
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-24.04, macos-15]
    name: Build reindexer for ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Install build dependencies (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential cmake
      - name: Build reindexer
        run: |
          git clone https://github.com/Restream/reindexer.git
          cd reindexer
          if [[ "${{ matrix.platform }}" == ubuntu-* ]]; then
            sudo ./dependencies.sh
          else
            ./dependencies.sh
          fi
          mkdir -p build && cd build
          cmake ..
          make -j4
          cpack
          find . -name CMakeFiles -o -name "*.cc" -o -name "*.h" -o \
            -name Makefile -o -name _cmrc -o -name "*.json" -o -name "*.txt" -o -name \
            "*.in" | xargs -n1 rm -rf
          rm -rf _CPack_Packages \
            cpp_src/server/reindexer_server_resources cpp_src/server/face \
            cpp_src/server/swagger cpp_src/cmd/reindexer_server/contrib \
            cpp_src/leveldb_lib* cpp_src/snappy_lib* \
            cpp_src/cmd/reindexer_tool/replxx_lib* Testing cpp_src/gtests/tests/logs
          find . -empty -type d -delete
      - name: Store build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build_${{ matrix.platform }}
          path: reindexer/build

  test:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.13"]
        platform: [ubuntu-24.04, macos-15]
        include:
          - python: "3.8"
            platform: ubuntu-24.04
            distutils: stdlib
          - python: "3.10"
            platform: ubuntu-24.04
          - python: "3.11"
            platform: ubuntu-24.04
          - python: "3.12"
            platform: ubuntu-24.04
    runs-on: ${{ matrix.platform }}
    env:
      SETUPTOOLS_USE_DISTUTILS: ${{ matrix.distutils || 'local' }}
      MACOSX_DEPLOYMENT_TARGET: "15"
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout PyReindexer repo
        uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build_${{ matrix.platform }}
          path: reindexer_build
      - name: Install Reindexer-Dev/Server (MacOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          cd reindexer_build
          for archive in reindexer-*-Darwin-*.tar.gz; do
            tar -xzf "$archive"
          done
          mkdir -p /usr/local/lib /usr/local/include /usr/local/bin
          if [ -d "usr/local/bin" ]; then
            cp -f usr/local/bin/* /usr/local/bin/ 2>/dev/null || echo "No binaries"
          fi
          if [ -d "usr/local/lib" ]; then
            cp -f usr/local/lib/*.dylib /usr/local/lib/ 2>/dev/null || echo "No dylib files"
            cp -f usr/local/lib/*.a /usr/local/lib/ 2>/dev/null || echo "No static libs"
          fi
          if [ -d "usr/local/include" ]; then
            cp -rf usr/local/include/* /usr/local/include/ 2>/dev/null || echo "No includes"
          fi
          if [ -d "usr/local/lib/cmake" ]; then
            mkdir -p /usr/local/lib/cmake
            cp -rf usr/local/lib/cmake/* /usr/local/lib/cmake/ 2>/dev/null || echo "No cmake files"
          fi
          echo "CMAKE_PREFIX_PATH=/usr/local" >> $GITHUB_ENV
          find /usr/local -name "*reindexer*" -type f 2>/dev/null || echo "No reindexer files found"
          update_dyld_shared_cache || true
      - name: Install Reindexer-Dev/Server (Ubuntu)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libunwind-dev
          cd reindexer_build
          sudo dpkg -i reindexer-server*.deb || true
          sudo apt-get install -y -f || true
          sudo dpkg -i reindexer-dev*.deb || true
          sudo apt-get install -y -f || true
          cd ..
      - name: Set up Python ${{ matrix.python }}
        id: python-install
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: false
        env:
          PIP_DISABLE_PIP_VERSION_CHECK: 1
          SETUPTOOLS_USE_DISTUTILS: ${{ matrix.distutils || 'local' }}
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade --disable-pip-version-check pip setuptools build
          python -m pip install -r requirements.txt
      - name: Build PyReindexer
        run: |
          python -m build
          python -m pip install .
      - name: Test
        run: |
          cd pyreindexer
          $GITHUB_WORKSPACE/.github/workflows/test.sh
