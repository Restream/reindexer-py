name: Test the project

on:
  push:
    branches-ignore:
      - master
jobs:
  test-macos:
    runs-on: macos-14-large
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout PyReindexer
        uses: actions/checkout@v4
      - name: Install Reindexer
        run: |
          brew tap restream/reindexer
          brew install reindexer
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          architecture: x64
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install build
      - name: Prepare Test Environment
        run: python -m pip install -r requirements.txt
      - name: Build PyReindexer
        run: |
          python -m build
          pip install .
      - name: Test
        run: |
          cd pyreindexer
          $GITHUB_WORKSPACE/.github/workflows/test.sh

  test-ubuntu:
    strategy:
      matrix:
        os: [ubuntu-20.04,ubuntu-22.04]
      fail-fast: false
    runs-on: ${{matrix.os}}
    env:
      OS: ${{matrix.os}}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout PyReindexer
        uses: actions/checkout@v4
      - name: Install Reindexer-Dev
        run: |
          curl https://repo.reindexer.io/RX-KEY.GPG | sudo apt-key add
          if [[ $OS == ubuntu-20.04 ]]; then
            echo 'deb https://repo.reindexer.io/ubuntu-focal /' | sudo tee -a /etc/apt/sources.list
          else
            echo 'deb https://repo.reindexer.io/ubuntu-jammy /' | sudo tee -a /etc/apt/sources.list
          fi
          sudo apt-get update -y
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y reindexer-dev
      - name: Install Reindexer-Server
        run: sudo apt-get install -y reindexer-server
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install build
      - name: Prepare Test Environment
        run: python -m pip install -r requirements.txt
      - name: Build PyReindexer
        run: |
          python -m build
          pip install .
      - name: Test
        run: |
          cd pyreindexer
          $GITHUB_WORKSPACE/.github/workflows/test.sh
